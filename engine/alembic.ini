# Alembic configuration file
# This file is read by alembic when running migrations.
#
# Usage:
#   alembic upgrade head       — apply all pending migrations
#   alembic downgrade -1       — roll back one migration
#   alembic revision --autogenerate -m "description"  — create a new migration

[alembic]
# Path to the migration scripts directory (relative to this file)
script_location = alembic

# Python path expression for the migration env module
# (leave blank to use the default alembic/env.py)

# Database URL — overridden at runtime from prophet.config.settings
# so this value is rarely used directly. You can also set:
#   ALEMBIC_DATABASE_URL=... alembic upgrade head
sqlalchemy.url = postgresql+asyncpg://prophet:prophet@localhost/prophet

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
