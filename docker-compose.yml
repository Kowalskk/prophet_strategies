version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: prophet_user
      POSTGRES_PASSWORD: prophet_password
      POSTGRES_DB: prophet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophet_user -d prophet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 60s
    shm_size: "256mb"
    command: >
      postgres
      -c wal_level=replica
      -c checkpoint_timeout=5min
      -c max_wal_size=256MB
      -c min_wal_size=80MB
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  engine:
    build:
      context: ./src/engine
      dockerfile: Dockerfile
    env_file:
      - ./src/engine/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
